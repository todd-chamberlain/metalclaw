preset:
  name: slack
  description: Slack API and Socket Mode with WebSocket CONNECT tunnels

network_policies:
  slack:
    name: slack
    endpoints:
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/api/**" }
      - host: api.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: hooks.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/**" }
      - host: wss-primary.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        access: full
      - host: wss-backup.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        access: full
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/bash }
