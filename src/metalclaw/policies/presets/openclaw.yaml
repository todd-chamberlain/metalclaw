preset:
  name: openclaw
  description: OpenClaw agent - messaging platform access and tool endpoints

network_policies:
  openclaw_gateway:
    name: openclaw_gateway
    endpoints:
      - host: "*.openclaw.com"
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: clawhub.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }

  whatsapp:
    name: whatsapp
    endpoints:
      - host: "*.whatsapp.net"
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        access: full
      - host: "*.whatsapp.net"
        port: 5222
        protocol: tcp
        enforcement: enforce
        tls: passthrough
        access: full
      - host: "*.whatsapp.com"
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        access: full
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }

  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/bot*/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }

  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/api/**" }
      - host: "*.discord.com"
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: gateway.discord.gg
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        access: full
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }

  slack:
    name: slack
    endpoints:
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/api/**" }
      - host: api.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: hooks.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/**" }
      - host: wss-primary.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        access: full
      - host: wss-backup.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        access: full
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }

  mattermost:
    name: mattermost
    endpoints:
      - host: "*.mattermost.cloud"
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/api/v4/**" }
      - host: "*.mattermost.cloud"
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        access: full
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/curl }

  github_tools:
    name: github_tools
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
      - { path: /usr/bin/curl }
