preset:
  name: npm
  description: npm registry access for package installation

network_policies:
  npm:
    name: npm
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: "*.npmjs.com"
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/bin/npm }
      - { path: /usr/bin/npx }
      - { path: /usr/local/bin/npm }
      - { path: /usr/local/bin/npx }
