preset:
  name: huggingface
  description: Hugging Face model hub, LFS, and inference API access

network_policies:
  huggingface:
    name: huggingface
    endpoints:
      - host: huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/api/**" }
      - host: cdn-lfs.huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
      - host: api-inference.huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/curl }
      - { path: "/usr/bin/python3*" }
      - { path: "/usr/local/bin/python3*" }
      - { path: /usr/local/bin/huggingface-cli }
