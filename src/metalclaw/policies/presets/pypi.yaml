name: pypi
description: Python package installation via pip

network_policies:
  default_action: deny
  allow_localhost: true
  allowed_endpoints:
    - host: pypi.org
      ports: [443]
      protocol: tcp
      direction: outbound
      binaries: [/usr/bin/pip3, /usr/bin/python3]
      access: read-only
    - host: files.pythonhosted.org
      ports: [443]
      protocol: tcp
      direction: outbound
      binaries: [/usr/bin/pip3, /usr/bin/python3]
      access: read-only
