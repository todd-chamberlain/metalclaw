preset:
  name: pypi
  description: Python package installation via pip

network_policies:
  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/bin/pip3 }
      - { path: "/usr/bin/python3*" }
      - { path: /usr/local/bin/pip3 }
      - { path: "/usr/local/bin/python3*" }
