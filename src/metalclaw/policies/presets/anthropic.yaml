name: anthropic
description: Anthropic API access for Claude Code agent

network_policies:
  default_action: deny
  allow_localhost: true
  allowed_endpoints:
    - host: api.anthropic.com
      ports: [443]
      protocol: tcp
      direction: outbound
      binaries: [/usr/local/bin/claude]
      access: full
      tls: terminate
    - host: "*.anthropic.com"
      ports: [443]
      protocol: tcp
      direction: outbound
      binaries: [/usr/local/bin/claude]
      access: full
