name: github
description: Git and GitHub CLI access

network_policies:
  default_action: deny
  allow_localhost: true
  allowed_endpoints:
    - host: github.com
      ports: [443]
      protocol: tcp
      direction: outbound
      binaries: [/usr/bin/git, /usr/bin/gh, /usr/bin/curl]
      access: full
    - host: api.github.com
      ports: [443]
      protocol: tcp
      direction: outbound
      binaries: [/usr/bin/git, /usr/bin/gh, /usr/bin/curl]
      access: full
      tls: terminate
    - host: "*.githubusercontent.com"
      ports: [443]
      protocol: tcp
      direction: outbound
      access: read-only
